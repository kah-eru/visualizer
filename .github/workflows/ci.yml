name: CI

# Run the unit tests on pull requests and on pushes to non-main branches.
# Pushes to main are covered by the deploy workflow, which gates the build on these same tests.
on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:run
